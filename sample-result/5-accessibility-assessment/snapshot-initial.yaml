            - link "同じように主に文字を用いたユーザーインターフェースの2つのスクリーンショット。上のものは赤、緑、青を使用している。下のものは赤と緑にほぼ同じ色を使用しているもので、赤い文字は緑の背景の中でほとんど見えなくなっている。" [ref=e429] [cursor=pointer]:
              - /url: /wiki/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB:Example_of_team_color_problem_on_Clive_Churchill_article.png
