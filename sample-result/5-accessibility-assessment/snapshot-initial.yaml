            - text: 。
          - paragraph [ref=e314]:
            - text: 特に世界遺産に関しては、改修などを制限する
            - generic "リンク先の項目はまだありません。新規の執筆や他言語版からの翻訳が望まれます。" [ref=e315]:
              - link "真正性" [ref=e316] [cursor=pointer]:
