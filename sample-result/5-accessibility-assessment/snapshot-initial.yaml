              - generic [ref=e317]:
                - text: （
                - link "英語版" [ref=e318] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Authenticity_in_art
                - text: ）
            - text: の取り決めがあり
            - superscript [ref=e319]:
              - link "[3]" [ref=e320] [cursor=pointer]:
                - /url: "#cite_note-3"
            - text: 、
            - link "ヨーロッパ" [ref=e321] [cursor=pointer]:
              - /url: /wiki/%E3%83%A8%E3%83%BC%E3%83%AD%E3%83%83%E3%83%91
            - text: の世界遺産において、
            - link "国際連合教育科学文化機関" [ref=e322] [cursor=pointer]:
              - /url: /wiki/%E5%9B%BD%E9%9A%9B%E9%80%A3%E5%90%88%E6%95%99%E8%82%B2%E7%A7%91%E5%AD%A6%E6%96%87%E5%8C%96%E6%A9%9F%E9%96%A2
            - text: がアクセシビリティに関するあり方の協議を始めている
            - superscript [ref=e323]:
              - link "[4]" [ref=e324] [cursor=pointer]:
                - /url: "#cite_note-4"
            - text: 。また、
            - link "イギリス" [ref=e325] [cursor=pointer]:
              - /url: /wiki/%E3%82%A4%E3%82%AE%E3%83%AA%E3%82%B9
            - text: ・
            - link "カンタベリー大主教" [ref=e326] [cursor=pointer]:
              - /url: /wiki/%E3%82%AB%E3%83%B3%E3%82%BF%E3%83%99%E3%83%AA%E3%83%BC%E5%A4%A7%E4%B8%BB%E6%95%99
            - text: の
            - link "ジャスティン・ウェルビー" [ref=e327] [cursor=pointer]:
              - /url: /wiki/%E3%82%B8%E3%83%A3%E3%82%B9%E3%83%86%E3%82%A3%E3%83%B3%E3%83%BB%E3%82%A6%E3%82%A7%E3%83%AB%E3%83%93%E3%83%BC
            - text: は「
            - link "信徒" [ref=e328] [cursor=pointer]:
              - /url: /wiki/%E4%BF%A1%E5%BE%92
            - text: が
            - link "礼拝" [ref=e329] [cursor=pointer]:
              - /url: /wiki/%E7%A4%BC%E6%8B%9D
            - text: に訪れる
            - link "教会" [ref=e330] [cursor=pointer]:
              - /url: /wiki/%E6%95%99%E4%BC%9A
            - text: を含めた歴史的建造物において、その
            - link "文化遺産" [ref=e331] [cursor=pointer]:
              - /url: /wiki/%E6%96%87%E5%8C%96%E9%81%BA%E7%94%A3
            - text: としての保護よりもアクセシビリティの整備を優先すべき」とし、「障害者を含む全て人々の心が満たされることで保護の意識も高まる」と述べている
            - superscript [ref=e332]:
              - link "[5]" [ref=e333] [cursor=pointer]:
                - /url: "#cite_note-5"
            - text: 。
          - link "[icon]" [ref=e335] [cursor=pointer]:
            - /url: /wiki/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB:Wiki_letter_w_cropped.svg
            - img "[icon]" [ref=e336]
          - generic [ref=e337]:
            - text: この節の
            - link "加筆" [ref=e338] [cursor=pointer]:
              - /url: https://ja.wikipedia.org/w/index.php?title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3&action=edit
            - text: が望まれています。
          - generic [ref=e339]:
            - heading "サービスにおけるアクセシビリティ" [level=2] [ref=e340]: サービスにおけるアクセシビリティ
            - generic [ref=e341]:
              - text: "["
              - link "編集" [ref=e342] [cursor=pointer]:
                - /url: /w/index.php?title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3&action=edit&section=3
              - text: "]"
          - paragraph [ref=e343]: 助成制度や補助制度などのサービスを、高齢者・障害者を含む誰もが、支障なく利用できることあるいはその度合いをいう。サービスは、利用による便益が、これを享受するための手間を凌駕してこそ利用価値があることから、サービス利用による便益享受に至るまでがアクセシビリティの評価対象となる。
          - generic [ref=e344]:
            - heading "ウェブページにおけるアクセシビリティ" [level=2] [ref=e345]: ウェブページにおけるアクセシビリティ
            - generic [ref=e346]:
              - text: "["
              - link "編集" [ref=e347] [cursor=pointer]:
                - /url: /w/index.php?title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3&action=edit&section=4
              - text: "]"
          - paragraph [ref=e348]:
            - link "ウェブページ" [ref=e349] [cursor=pointer]:
              - /url: /wiki/%E3%82%A6%E3%82%A7%E3%83%96%E3%83%9A%E3%83%BC%E3%82%B8
            - text: におけるアクセシビリティとは、障害をもつ人が利用できるように
            - link "ウェブページ" [ref=e350] [cursor=pointer]:
              - /url: /wiki/%E3%82%A6%E3%82%A7%E3%83%96%E3%83%9A%E3%83%BC%E3%82%B8
            - text: が設計・開発されていることを意味する。
          - paragraph [ref=e351]:
            - text: またウェブではコンピュータが情報を判別できることも重要である。検索サイトを作るための
            - link "クローラ" [ref=e352] [cursor=pointer]:
              - /url: /wiki/%E3%82%AF%E3%83%AD%E3%83%BC%E3%83%A9
            - text: によって効率的に解読されたり、ソフトウェアが情報を判別するのに役に立つ。
          - paragraph [ref=e353]:
            - text: ウェブページには、閲覧するための
            - link "ウェブブラウザ" [ref=e354] [cursor=pointer]:
              - /url: /wiki/%E3%82%A6%E3%82%A7%E3%83%96%E3%83%96%E3%83%A9%E3%82%A6%E3%82%B6
            - text: を指定したり、
            - link "解像度" [ref=e355] [cursor=pointer]:
              - /url: /wiki/%E8%A7%A3%E5%83%8F%E5%BA%A6
            - text: を指定したデザイン、
            - link "Macromedia Flash" [ref=e356] [cursor=pointer]:
              - /url: /wiki/Macromedia_Flash
            - text: のような技術を使用したものがあるが、代替の情報を加えることによって異なる環境でも情報を取得することができる。障害者用のソフトウェアは、ウェブページの情報を
            - link "音声" [ref=e357] [cursor=pointer]:
              - /url: /wiki/%E9%9F%B3%E5%A3%B0
            - text: や
            - link "点字" [ref=e358] [cursor=pointer]:
              - /url: /wiki/%E7%82%B9%E5%AD%97
            - text: によって出力するが、代替情報がない場合に情報が取得できない場合がある。
          - paragraph [ref=e359]:
            - link "総務省" [ref=e360] [cursor=pointer]:
              - /url: /wiki/%E7%B7%8F%E5%8B%99%E7%9C%81
            - text: によれば、障害者のインターネット利用状況は、「利用している」53.0%、「利用していない」46.9%である。障害種別にみると、視覚障害、聴覚障害、肢体不自由では「利用している」がそれぞれ91.7%、93.4%、82.7%、知的障害では、「利用していない」53.0%である
            - superscript [ref=e361]:
              - link "[6]" [ref=e362] [cursor=pointer]:
                - /url: "#cite_note-6"
            - text: 。
          - paragraph [ref=e363]: アクセシビリティに配慮するためのリニューアルの費用を抑えるため、不自由のある人の使用性を高めるプラグインやASPサービスも普及している。HTMLレベルでのアクセシビリティの実装に膨大な費用が掛かる場合、暫定的な方法となりえる。
          - paragraph [ref=e364]:
            - text: ウェブに関する主要な国際機関である
            - link "World Wide Web Consortium" [ref=e365] [cursor=pointer]:
              - /url: /wiki/World_Wide_Web_Consortium
            - text: (W3C) により、
            - link "ウェブ・コンテンツ・アクセシビリティ・ガイドライン" [ref=e366] [cursor=pointer]:
              - /url: /wiki/Web_Content_Accessibility_Guidelines
            - text: (WCAG) が策定されている。2023年にバージョン2.2(WCAG 2.2)が、2018年にバージョン2.1(WCAG 2.1)が、1999年にバージョン1.0 (WCAG 1.0) が、2008年にバージョン2.0 (WCAG 2.0) が策定されている。WCAG 2.0は、2012年10月に
            - link "国際標準化機構" [ref=e367] [cursor=pointer]:
              - /url: /wiki/%E5%9B%BD%E9%9A%9B%E6%A8%99%E6%BA%96%E5%8C%96%E6%A9%9F%E6%A7%8B
            - text: (ISO) と
            - link "国際電気標準会議" [ref=e368] [cursor=pointer]:
              - /url: /wiki/%E5%9B%BD%E9%9A%9B%E9%9B%BB%E6%B0%97%E6%A8%99%E6%BA%96%E4%BC%9A%E8%AD%B0
            - text: (IEC) の技術標準の「
            - link "ISO/IEC" [ref=e369] [cursor=pointer]:
              - /url: /wiki/ISO/IEC_JTC_1
            - text: 40500:2012」となっている。
          - generic [ref=e370]:
            - heading "日本産業規格のウェブアクセシビリティ" [level=3] [ref=e371]: 日本産業規格のウェブアクセシビリティ
            - generic [ref=e372]:
              - text: "["
              - link "編集" [ref=e373] [cursor=pointer]:
                - /url: /w/index.php?title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3&action=edit&section=5
              - text: "]"
          - figure "日本産業規格の「高齢者・障害者等配慮設計指針－情報通信における機器，ソフトウェア及びサービス」の規格は、基本規格、共通規格、個別規格の3層構造である。ウェブコンテンツは個別規格の第3部である" [ref=e374]:
            - link [ref=e375] [cursor=pointer]:
              - /url: /wiki/%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB:3%E5%B1%A4%E6%A7%8B%E9%80%A0.png
              - img [ref=e376]
            - generic [ref=e377]: 日本産業規格の「高齢者・障害者等配慮設計指針－情報通信における機器，ソフトウェア及びサービス」の規格は、基本規格、共通規格、個別規格の3層構造である。ウェブコンテンツは個別規格の第3部である
          - paragraph [ref=e378]:
            - text: 日本では
            - link "日本産業規格" [ref=e379] [cursor=pointer]:
              - /url: /wiki/%E6%97%A5%E6%9C%AC%E7%94%A3%E6%A5%AD%E8%A6%8F%E6%A0%BC
            - text: (JIS) により規格化されている。2004年6月20日にJIS X 8341-3が公表された。
          - list [ref=e380]:
            - listitem [ref=e381]: X 8341-3：高齢者・障害者等配慮設計指針—情報通信における機器、ソフトウェア及びサービス—第3部：ウェブコンテンツ
          - paragraph [ref=e382]: これは一般的にWebコンテンツJISと呼ばれる。JIS X 8341-3:2004は国内外の既存ガイドラインなどを参考に、日本語特有と思われる事項も網羅した独自の指針で制定された。
          - paragraph [ref=e383]: ここでいうウェブコンテンツとは、ウェブブラウザ、支援技術などのユーザエージェントによって利用者に伝達されるあらゆる情報及び感覚的な体験を指す。日本産業規格の情報処理部門が、主に高齢者、障害のある人および一時的な障害のある人に対して、ウェブコンテンツを知覚し、理解し、操作できるようにするためにウェブコンテンツを、制作し検証するために配慮すべき事項を指針として明示したものである。
          - paragraph [ref=e384]: 2008年にWCAG 2.0が勧告されたことを受け、WCAG 2.0を包含する形で2010年8月20日にJIS X 8341-3:2010として改正された。改正前と同様に、知覚可能性、操作可能性、理解可能性、堅牢性の4つの原則に整理され、61個の基準が示されている。またプロセス（企画、設計〜運用まで）および試験方法を独自に追加している。
          - paragraph [ref=e385]: 2012年10月にWCAG 2.0が国際規格「ISO/IEC 40500:2012」として制定されたことを受け、国際規格の一致規格とする形で2016年3月22日にJIS X 8341-3:2016として改正された。独自の表現としていた訳語を2016年の改正ではWCAG 2.0に忠実に合わせる（あえて原文の分かりにくさも尊重する）ことや、2010年版で独自に追加した要求事項を附属書として追加することが行われた。
          - paragraph [ref=e386]: 2023年以降、WCAG 2.2が勧告されることに併せて国際規格および日本産業規格が改正される予定となっている。
          - paragraph [ref=e387]:
            - text: JISへの準拠は基本的に任意であるが、
            - link "産業標準化法" [ref=e388] [cursor=pointer]:
              - /url: /wiki/%E7%94%A3%E6%A5%AD%E6%A8%99%E6%BA%96%E5%8C%96%E6%B3%95
            - text: の第67条では「国及び地方公共団体は、鉱工業に関する技術上の基準を定めるとき、その買い入れる鉱工業品に関する仕様を定めるとき（中略）日本産業規格を尊重してこれをしなければならない」とあり、尊重義務が発生する。
          - generic [ref=e389]:
            - heading "ウェブアクセシビリティが実現してゆくこと" [level=2] [ref=e390]: ウェブアクセシビリティが実現してゆくこと
            - generic [ref=e391]:
              - text: "["
              - link "編集" [ref=e392] [cursor=pointer]:
                - /url: /w/index.php?title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3&action=edit&section=6
              - text: "]"
          - paragraph [ref=e393]:
            - link "言語障害" [ref=e394] [cursor=pointer]:
              - /url: /wiki/%E8%A8%80%E8%AA%9E%E9%9A%9C%E5%AE%B3
            - text: など、
            - link "視力" [ref=e395] [cursor=pointer]:
              - /url: /wiki/%E8%A6%96%E5%8A%9B
            - text: 、
            - link "聴力" [ref=e396] [cursor=pointer]:
              - /url: /wiki/%E8%81%B4%E5%8A%9B
            - text: 、
            - link "発声" [ref=e397] [cursor=pointer]:
              - /url: /wiki/%E7%99%BA%E5%A3%B0
            - text: といった
            - link "コミュニケーション" [ref=e398] [cursor=pointer]:
              - /url: /wiki/%E3%82%B3%E3%83%9F%E3%83%A5%E3%83%8B%E3%82%B1%E3%83%BC%E3%82%B7%E3%83%A7%E3%83%B3
            - text: 上の障害や、運動障害による
            - link "情報格差" [ref=e399] [cursor=pointer]:
              - /url: /wiki/%E6%83%85%E5%A0%B1%E6%A0%BC%E5%B7%AE
            - text: を軽減する。これまでになかった多様なコミュニケーションが可能となりえる。
          - paragraph [ref=e400]: アクセシビリティを向上させることで機能が低下することにも注意が必要である。システムの即応性や、多機能化が必要な場合に、同等の代替手段としてアクセシビリティにも考慮される。特に、人命に関わる情報提供などで議論されてきている。
          - paragraph [ref=e401]: ウェブサイトから公的な情報を的確に取得できるようになる。これにより技術の発展によって他者の介助に依存することなく、情報の取得と発信の可能性を拡げることが期待される。
          - generic [ref=e402]:
            - term [ref=e403]: 視覚障害：失視
            - definition [ref=e404]:
              - link "スクリーンリーダー" [ref=e405] [cursor=pointer]:
                - /url: /wiki/%E3%82%B9%E3%82%AF%E3%83%AA%E3%83%BC%E3%83%B3%E3%83%AA%E3%83%BC%E3%83%80%E3%83%BC
              - text: あるいは
              - link "音声ブラウザ" [ref=e406] [cursor=pointer]:
                - /url: /wiki/%E9%9F%B3%E5%A3%B0%E3%83%96%E3%83%A9%E3%82%A6%E3%82%B6
              - text: と呼ばれるソフトウェアを用いる。
              - link "音声認識" [ref=e407] [cursor=pointer]:
                - /url: /wiki/%E9%9F%B3%E5%A3%B0%E8%AA%8D%E8%AD%98
              - text: や
              - link "合成音声による音訳" [ref=e408] [cursor=pointer]:
                - /url: /wiki/%E9%9F%B3%E8%A8%B3#合成音声による音訳
              - text: への対応が課題となる。なお、印刷物に対して
              - link "光学文字認識" [ref=e409] [cursor=pointer]:
                - /url: /wiki/%E5%85%89%E5%AD%A6%E6%96%87%E5%AD%97%E8%AA%8D%E8%AD%98
              - text: (OCR)を行い音声化する方法では、枠線などで読めない場合が多い。
            - term [ref=e410]: 視力障害：重度弱視
            - definition [ref=e411]:
              - text: 重度弱視（
              - link "ロービジョン" [ref=e412] [cursor=pointer]:
                - /url: /wiki/%E3%83%AD%E3%83%BC%E3%83%93%E3%82%B8%E3%83%A7%E3%83%B3
              - text: ）では、文字拡大の手段と、場合により音声の手段とを使い分けることが多い。コンピュータ上では画面をルーペで拡大する場合と、ソフトウェアで拡大する場合がある。文字の大きさが小さいと特に読みづらさが増すので、大きめに設計してほしいという当事者もいる。なお、印刷物では
              - link "拡大読書器" [ref=e413] [cursor=pointer]:
                - /url: /w/index.php?title=%E6%8B%A1%E5%A4%A7%E8%AA%AD%E6%9B%B8%E5%99%A8&action=edit&redlink=1
              - text: などモニターに拡大表示を行う装置が存在する。
            - definition [ref=e414]: 音声による手段については、失視と同様である。
            - term [ref=e415]: 聴覚障害
            - definition [ref=e416]:
              - text: 電話の使用が不自由なため、文字が扱えればハンディは軽減される。問い合わせ先には、キー入力が未学習の人を対象として
              - link "ファクシミリ" [ref=e417] [cursor=pointer]:
                - /url: /wiki/%E3%83%95%E3%82%A1%E3%82%AF%E3%82%B7%E3%83%9F%E3%83%AA
              - text: 番号の掲載があると望ましい。
            - term [ref=e418]: 上肢運動障害
            - definition [ref=e419]: ウェブページ上で操作上の工夫があれば、スイッチやリンクからの閲覧や移動が可能である。
            - term [ref=e420]: 盲聾
            - definition [ref=e421]:
              - link "全盲聾" [ref=e422] [cursor=pointer]:
                - /url: /wiki/%E7%9B%B2%E3%82%8D%E3%81%86%E8%80%85
              - text: （ぜんもうろう）では、
              - link "点字ディスプレー" [ref=e423] [cursor=pointer]:
                - /url: /wiki/%E7%82%B9%E5%AD%97
              - text: は優れているが高価すぎ、また文字数などレスポンスは良いとはいえない。
          - generic [ref=e424]:
            - heading "望まれる方法" [level=3] [ref=e425]: 望まれる方法
            - generic [ref=e426]:
