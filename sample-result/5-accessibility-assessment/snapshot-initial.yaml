          - list [ref=e432]:
            - listitem [ref=e433]:
              - text: 画像への
              - link "代替テキスト" [ref=e434] [cursor=pointer]:
                - /url: /wiki/%E4%BB%A3%E6%9B%BF%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88
              - text: 。（
              - code [ref=e435]: <img alt="画像が見えない場合の説明" />
              - text: ）
            - listitem [ref=e436]:
              - text: 重複する表記の省略：重複する表記の記述を可能な限り減らすように配慮する。またタイトルやメニューの一覧などは、スクリーンリーダーや音声認識などを用いてジャンプする（
              - code [ref=e437]: <a href="#mainText">本文へジャンプ</a>
              - text: ・・タイトル・メニュー・・・
              - code [ref=e438]: <a id="mainText">本文</a>）
              - text: ）。
            - listitem [ref=e439]:
              - text: リンクの範囲を大きく（
              - code [ref=e440]: tabindex
              - text: や、アクセスキーの使用）
            - listitem [ref=e441]: 文字サイズの可変性：文字の大きさを特殊なソフトを使用しなくても拡大できる。文字の大きさを絶対サイズではなく、相対サイズで定義すれば、汎用ブラウザで拡大ができる。
            - listitem [ref=e442]:
              - link "スタイルシート" [ref=e443] [cursor=pointer]:
                - /url: /wiki/%E3%82%B9%E3%82%BF%E3%82%A4%E3%83%AB%E3%82%B7%E3%83%BC%E3%83%88
              - text: の解除や、ユーザスタイルシートに対応した属性の定義。
            - listitem [ref=e444]:
              - link "色覚異常" [ref=e445] [cursor=pointer]:
                - /url: /wiki/%E8%89%B2%E8%A6%9A%E7%95%B0%E5%B8%B8
              - text: （第一、第二、第三、全色盲）への配慮を可能な限りする。赤・緑・黄・水色などにウェブデザイナーが注意する。
          - generic [ref=e446]:
            - heading "課題" [level=3] [ref=e447]: 課題
            - generic [ref=e448]:
              - text: "["
              - link "編集" [ref=e449] [cursor=pointer]:
                - /url: /w/index.php?title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3&action=edit&section=8
              - text: "]"
          - paragraph [ref=e450]: アクセシビリティというカタカナの訳語自体が理解されにくいのではないかという指摘もある。「アクセシビリティ対応」などと書いていても、万人が理解しやすいとはいえない点も考慮する必要がある。
          - paragraph [ref=e451]:
            - text: 明確な基準がない中で、十分なアクセシビリティを確保していなくても「アクセシビリティに配慮した」という表現を行うケースもある。実情に即した対応を行うには、知識だけのアクセシビリティではなく、障害当事者を交えて改善（
            - link "フィードバック" [ref=e452] [cursor=pointer]:
              - /url: /wiki/%E3%83%95%E3%82%A3%E3%83%BC%E3%83%89%E3%83%90%E3%83%83%E3%82%AF
            - text: ）を行っていく必要がある。
          - paragraph [ref=e453]:
            - link "HTML" [ref=e454] [cursor=pointer]:
              - /url: /wiki/HyperText_Markup_Language
            - text: 、
            - link "CSS" [ref=e455] [cursor=pointer]:
              - /url: /wiki/Cascading_Style_Sheets
            - text: などの
            - link "コーディング" [ref=e456] [cursor=pointer]:
              - /url: /wiki/%E3%82%B3%E3%83%BC%E3%83%87%E3%82%A3%E3%83%B3%E3%82%B0
            - text: 規格は、英語圏を中心に標準化されており、日本語の表現をそのままコーディングできない現状もある。
          - generic [ref=e457]:
            - heading "オフィス文書のアクセシビリティ" [level=2] [ref=e458]: オフィス文書のアクセシビリティ
            - generic [ref=e459]:
              - text: "["
              - link "編集" [ref=e460] [cursor=pointer]:
                - /url: /w/index.php?title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3&action=edit&section=9
              - text: "]"
          - paragraph [ref=e461]:
            - text: ウェブページ以外にも、
            - link "Microsoft Office" [ref=e462] [cursor=pointer]:
              - /url: /wiki/Microsoft_Office
            - text: などによって作成されたOOXML文書、
            - link "LibreOffice" [ref=e463] [cursor=pointer]:
              - /url: /wiki/LibreOffice
            - text: などによって作成されたODF文書、それらを変換して作成されたPDF文書が大量に存在する。これらがアクセシブルであることは重要である。
          - paragraph [ref=e464]: OOXMLについては、ISO/IEC 29500-1のAnnex Jに、アクセシビリティのためのベストプラクティスが示されている。そこでは、実装も、文書作成者も、アクセシビリティを達成するための努力が求められている。
          - paragraph [ref=e465]: ODFについては、ODF 1.3 Part 3のAppendix Dに、アクセシビリティガイドラインが示されている。
          - paragraph [ref=e466]: PDFについては、JIS X 8341-3:2016に、アクセシビリティのための要件が示されている。ナビゲーションができることは要件の一つであるが、そうしたPDFを作ることは困難なことがある。
