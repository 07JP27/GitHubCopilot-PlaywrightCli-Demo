          - paragraph [ref=e271]:
            - text: アクセシビリティ（
            - link "英" [ref=e272] [cursor=pointer]:
              - /url: /wiki/%E8%8B%B1%E8%AA%9E
            - text: ": accessibility、略称: A11Y）とは、"
            - link "障害者" [ref=e273] [cursor=pointer]:
              - /url: /wiki/%E9%9A%9C%E5%AE%B3%E8%80%85
            - text: が他の人と同じように物理的環境、輸送機関、情報通信及びその他の施設・サービスを利用できることをいう。
          - paragraph [ref=e274]:
            - text: 上記の定義は
            - link "障害者権利条約" [ref=e275] [cursor=pointer]:
              - /url: /wiki/%E9%9A%9C%E5%AE%B3%E8%80%85%E6%A8%A9%E5%88%A9%E6%9D%A1%E7%B4%84
            - text: に基づく。その
            - link "第9条" [ref=e276] [cursor=pointer]:
              - /url: /wiki/%E9%9A%9C%E5%AE%B3%E8%80%85%E6%A8%A9%E5%88%A9%E6%9D%A1%E7%B4%84#第9条_アクセシビリティ
            - text: は、英文では"Accessibility"であり、
            - link "外務省が提供する日本語訳" [ref=e277] [cursor=pointer]:
              - /url: https://www.mofa.go.jp/mofaj/files/000018093.pdf
            - text: では「施設及びサービス等の利用の容易さ」となっている。
            - link "欧州アクセシビリティ法" [ref=e278] [cursor=pointer]:
              - /url: /wiki/%E6%AC%A7%E5%B7%9E%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3%E6%B3%95
            - text: の定義もほぼ等しい。
          - generic [ref=e279]:
            - heading "建造物におけるアクセシビリティ" [level=2] [ref=e280]: 建造物におけるアクセシビリティ
            - generic [ref=e281]:
              - text: "["
              - link "編集" [ref=e282] [cursor=pointer]:
                - /url: /w/index.php?title=%E3%82%A2%E3%82%AF%E3%82%BB%E3%82%B7%E3%83%93%E3%83%AA%E3%83%86%E3%82%A3&action=edit&section=1
              - text: "]"
          - paragraph [ref=e283]:
            - text: 建物と、建物に至る経路において、高齢者や障害者を含む誰もが、支障なく利用できることあるいはその度合いをいう。建物は、建物に至る移動経路などの都市設計上の配慮がなされて初めて利用可能となることから、建物のみでなく建物利用に至る経路を含めてアクセシビリティに配慮することが望まれる。ただし、その過程で、セキュリティの低下を伴うことがあるため、状況によっては新たにバリアが設けられ、結局施設管理者による介助がなければ施設が利用できないような場合もでてくる（例えば、施設内に進入されることが望ましくない
            - link "自転車" [ref=e284] [cursor=pointer]:
              - /url: /wiki/%E8%87%AA%E8%BB%A2%E8%BB%8A
            - text: などの軽車両や
            - link "キックボード" [ref=e285] [cursor=pointer]:
              - /url: /wiki/%E3%82%AD%E3%83%83%E3%82%AF%E3%83%9C%E3%83%BC%E3%83%89
            - text: などの遊具の通行を阻止するために
            - link "車椅子" [ref=e286] [cursor=pointer]:
              - /url: /wiki/%E8%BB%8A%E6%A4%85%E5%AD%90
            - text: 用スロープに通行禁止用の柵が設けられ施錠されるなど）。
            - link "高齢者、障害者等の移動等の円滑化の促進に関する法律" [ref=e287] [cursor=pointer]:
